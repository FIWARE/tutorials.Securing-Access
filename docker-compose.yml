# WARNING: Do not deploy this tutorial configuration directly to a production environment
#
# The tutorial docker-compose files have not been written for production deployment and will not
# scale. A proper architecture has been sacrificed to keep the narrative focused on the learning
# goals, they are just used to deploy everything onto a single Docker machine. All FIWARE components
# are running at full debug and extra ports have been exposed to allow for direct calls to services.
# They also contain various obvious security flaws - passwords in plain text, no load balancing,
# no use of HTTPS and so on.
#
# This is all to avoid the need of multiple machines, generating certificates, encrypting secrets
# and so on, purely so that a single docker-compose file can be read as an example to build on,
# not use directly.
#
# When deploying to a production environment, please refer to the Helm Repository
# for FIWARE Components in order to scale up to a proper architecture:
#
# see: https://github.com/FIWARE/helm-charts/
version: "3.8"
services:
    # Orion is the context broker
    orion:
        image: quay.io/fiware/orion-ld:${ORION_LD_VERSION}
        platform: linux/amd64
        hostname: orion
        container_name: fiware-orion
        labels:
            org.fiware: tutorial
        depends_on:
            mongo-db:
                condition: service_healthy
        networks:
            default:
                ipv4_address: 172.18.1.9
        ports:
            - "${ORION_LD_PORT}:${ORION_LD_PORT}" # localhost:1026
        command: -dbhost mongo-db -logLevel DEBUG -forwarding -mongocOnly -wip entityMaps
        healthcheck:
            test: curl --fail -s http://orion:${ORION_LD_PORT}/version || exit 1
            interval: 5s
            retries: 12
            start_period: 10s

    # @context file is served from here
    ld-context:
        labels:
            org.fiware: 'tutorial'
        image: httpd:alpine
        hostname: context
        container_name: fiware-ld-context
        ports:
            - "3004:80"
        volumes:
            - data-models:/usr/local/apache2/htdocs/
            - type: bind
              source: ${PWD}/conf/mime.types
              target: /usr/local/apache2/conf/mime.types
              read_only: true
        healthcheck:
            test: (wget --server-response --spider --quiet http://context/ngsi-context.jsonld 2>&1 | awk 'NR==1{print $$2}' | grep -q -e "200") || exit 1

    # Redis cache for IoT sensor readings
    redis-sensors:
        labels:
            org.fiware: 'tutorial'
        image: redis:8.2.0-alpine
        container_name: redis
        hostname: redis-for-sensors
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 10s

    # Forwarder proxy for farmer tenant
    farmer:
        labels:
            org.fiware: 'tutorial'
        image: quay.io/fiware/tutorials.forwarder
        hostname: farmer
        container_name: cb-farmer
        ports:
            - "1027:80"
        environment:
            - TENANT=farmer
            - CONTEXT_BROKER=http://orion:${ORION_LD_PORT}
            - DEBUG=broker:*

    # Forwarder proxy for openiot tenant
    devices:
        labels:
            org.fiware: 'tutorial'
        image: quay.io/fiware/tutorials.forwarder
        hostname: openiot
        container_name: cb-devices
        ports:
            - "1028:80"
        environment:
            - TENANT=openiot
            - CONTEXT_BROKER=http://orion:${ORION_LD_PORT}
            - DEBUG=broker:*

    # IoT Device Simulator
    iot-sensors:
        labels:
            org.fiware: 'tutorial'
        image: quay.io/fiware/tutorials.iot-devices
        hostname: iot-sensors
        container_name: fiware-iot-devices
        depends_on:
            redis-sensors:
                condition: service_healthy
        expose:
            - "${TUTORIAL_DUMMY_DEVICE_PORT}"
        ports:
            - "${TUTORIAL_DUMMY_DEVICE_PORT}:${TUTORIAL_DUMMY_DEVICE_PORT}" # localhost:3001
        environment:
            - DEBUG=devices:*
            - WEB_APP_HOST=tutorial
            - WEB_APP_PORT=${TUTORIAL_APP_PORT}
            - IOTA_HTTP_HOST=iot-agent
            - IOTA_HTTP_PORT=${IOTA_SOUTH_PORT}
            - IOTA_DEFAULT_RESOURCE=/iot/json
            - PIG_COUNT=${PIG_COUNT}
            - COW_COUNT=${COW_COUNT}
            - REDIS_HOST=redis-for-sensors
            - DUMMY_DEVICES_PAYLOAD=JSON
        volumes:
            - data:/data

    # IoT Agent configured for the JSON protocol
    iot-agent:
        labels:
            org.fiware: 'tutorial'
        image: quay.io/fiware/iotagent-json:${JSON_VERSION}
        hostname: iot-agent
        container_name: fiware-iot-agent
        depends_on:
            mongo-db:
                condition: service_healthy
            ld-context:
                condition: service_healthy
        ports:
            - "${IOTA_NORTH_PORT}:${IOTA_NORTH_PORT}" # localhost:4041
            - "${IOTA_SOUTH_PORT}:${IOTA_SOUTH_PORT}" # localhost:7896
        environment:
            - IOTA_NORTH_PORT=${IOTA_NORTH_PORT}
            - IOTA_REGISTRY_TYPE=mongodb
            - IOTA_LOG_LEVEL=INFO
            - IOTA_TIMESTAMP=true
            - IOTA_AUTOCAST=true
            - IOTA_MONGO_URI=mongodb://mongo-db:${MONGO_DB_PORT}/iotagentjson
            - IOTA_HTTP_PORT=${IOTA_SOUTH_PORT}
            - IOTA_DEFAULT_RESOURCE=/iot/json
            - IOTA_PROVIDER_URL=http://iot-agent:${IOTA_NORTH_PORT}
            - IOTA_CB_NGSI_VERSION=ld
            - IOTA_JSON_LD_CONTEXT=http://context/ngsi-context.jsonld
            - IOTA_FALLBACK_TENANT=openiot
            - IOTA_MULTI_CORE=true
            - IOTA_AMQP_DISABLED=true
            - IOTA_MQTT_DISABLED=true
        healthcheck:
            interval: 30s

    # Tutorial acts as a farm management web application secured by Keycloak
    tutorial:
        labels:
            org.fiware: 'tutorial'
        image: quay.io/fiware/tutorials.ngsi-ld
        platform: linux/amd64
        hostname: tutorial
        container_name: fiware-tutorial
        depends_on:
            mongo-db:
                condition: service_healthy
            keycloak:
                condition: service_healthy
        networks:
            default:
                aliases:
                    - context-provider
        expose:
            - "${TUTORIAL_APP_PORT}"
        ports:
            - "${TUTORIAL_APP_PORT}:${TUTORIAL_APP_PORT}" # localhost:3000
        environment:
            - DEBUG=tutorial:*
            - WEB_APP_PORT=${TUTORIAL_APP_PORT}
            - IOTA_HTTP_HOST=iot-agent
            - IOTA_HTTP_PORT=${IOTA_SOUTH_PORT}
            - IOTA_DEFAULT_RESOURCE=/iot/json
            - DUMMY_DEVICES=http://iot-sensors:3001
            - DUMMY_DEVICES_PORT=${TUTORIAL_DUMMY_DEVICE_PORT}
            - DUMMY_DEVICES_TRANSPORT=HTTP
            - DUMMY_DEVICES_PAYLOAD=JSON
            - CONTEXT_BROKER=http://orion:${ORION_LD_PORT}/ngsi-ld/v1
            - MONGO_URL=mongodb://mongo-db:27017
            - IOTA_JSON_LD_CONTEXT=http://context/ngsi-context.jsonld
            - NGSI_LD_TENANT=openiot
            - SECURE_ENDPOINTS=true
            # Keycloak OIDC settings
            - OIDC_ISSUER=http://keycloak:8080/realms/farm-management
            - OIDC_CLIENT_ID=ngsi-ld-farm
            - OIDC_CLIENT_SECRET=1234
            - OIDC_REDIRECT_URI=http://localhost:${TUTORIAL_APP_PORT}/login/callback
            - OIDC_SCOPE=openid profile email

    # Keycloak is the Identity and Access Management server
    keycloak:
        image: quay.io/keycloak/keycloak:${KEYCLOAK_VERSION}
        container_name: fiware-keycloak
        hostname: keycloak
        labels:
            org.fiware: tutorial
        depends_on:
            postgres-keycloak:
                condition: service_healthy
        ports:
            - "${KEYCLOAK_PORT}:8080" # localhost:3005
        environment:
            - KC_DB=postgres
            - KC_DB_URL=jdbc:postgresql://postgres-keycloak/keycloak
            - KC_DB_USERNAME=keycloak
            - KC_DB_PASSWORD=password
            - KC_BOOTSTRAP_ADMIN_USERNAME=admin
            - KC_BOOTSTRAP_ADMIN_PASSWORD=1234
            - KEYCLOAK_ADMIN=admin
            - KEYCLOAK_ADMIN_PASSWORD=1234
            - KC_HTTP_PORT=8080
            - KC_HOSTNAME_STRICT=false
            - KC_HTTP_ENABLED=true
            - KC_HEALTH_ENABLED=true
        command: start-dev --import-realm
        volumes:
            - ./realm-config:/opt/keycloak/data/import:ro
        healthcheck:
            test: [ "CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '\"status\": \"UP\"'" ]
            interval: 30s
            timeout: 10s
            retries: 10
            start_period: 40s

    # PostgreSQL database for Keycloak
    postgres-keycloak:
        image: postgres:${POSTGRES_VERSION}
        container_name: db-postgres
        hostname: postgres-keycloak
        labels:
            org.fiware: tutorial
        environment:
            - POSTGRES_DB=keycloak
            - POSTGRES_USER=keycloak
            - POSTGRES_PASSWORD=password
        healthcheck:
            test: [ "CMD", "pg_isready", "-U", "keycloak" ]
            interval: 10s
            retries: 6

    # MongoDB database for Orion-LD and session storage
    mongo-db:
        image: mongo:${MONGO_DB_VERSION}
        hostname: mongo-db
        container_name: db-mongo
        labels:
            org.fiware: tutorial
        networks:
            default:
                ipv4_address: 172.18.1.8
        ports:
            - "${MONGO_DB_PORT}:${MONGO_DB_PORT}" # localhost:27017
        volumes:
            - mongo-db:/data/db
        healthcheck:
            test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
            interval: 5s
            retries: 12
            start_period: 10s

networks:
    default:
        labels:
            org.fiware: tutorial
        ipam:
            config:
                - subnet: 172.18.1.0/24

volumes:
    mongo-db: ~
    redis-data: ~
    data:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ${PWD}/data
    data-models:
        driver: local
        driver_opts:
            type: none
            o: bind
            device: ${PWD}/data-models
